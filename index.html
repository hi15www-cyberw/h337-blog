<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBrand 🚀</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;margin-top:100px;font-family:sans-serif;">

  <h1>MyBrand 🚀</h1>
  <p id="user">Ты не вошёл</p>

  <button id="loginBtn">Войти через Google</button>
  <button id="logoutBtn">Выйти</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnPp93cxNe9KE-5HM6IXoMAaSEoAJuTZ4",
      authDomain: "mybrand-blog.firebaseapp.com",
      projectId: "mybrand-blog"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userText = document.getElementById("user");

    loginBtn.onclick = () => {
      signInWithPopup(auth, provider)
        .catch(e => alert(e.message));
    };

    logoutBtn.onclick = () => {
      signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        userText.textContent = "Ты вошёл: " + user.displayName;
      } else {
        userText.textContent = "Ты не вошёл";
      }
    });
  </script>

</body>
</html>
