<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>h337 Blog</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --card: #f5f5f5;
    }

    body.dark {
      --bg: #0d1117;
      --text: #e6edf3;
      --card: #161b22;
    }

    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: #007bff;
      color: white;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1;}
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    .comment {
      margin-top: 10px;
      padding: 10px;
      background: var(--bg);
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h3>h337 Blog</h3>
  <button class="btn" onclick="toggleTheme()">🌙</button>
</header>

<div class="container">

  <div class="card">
    <h3>💡 Лайфхак</h3>
    <p>Пей больше воды — это улучшает концентрацию 💧</p>
  </div>

  <div class="card">
    <h3>✍️ Написать пост</h3>
    <textarea id="postInput" placeholder="Напиши что-нибудь..."></textarea>
    <button class="btn" onclick="addPost()">Опубликовать</button>
  </div>

  <div id="posts"></div>

  <div class="card">
    <h3>💬 Комментарии</h3>
    <textarea id="commentInput" placeholder="Комментарий..."></textarea>
    <button class="btn" onclick="addComment()">Отправить</button>
    <div id="comments"></div>
  </div>

</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark"));
}

if (localStorage.getItem("theme") === "true") {
  document.body.classList.add("dark");
}

function addPost() {
  let text = document.getElementById("postInput").value;
  if (!text) return;

  let div = document.createElement("div");
  div.className = "card";
  div.innerText = text;

  document.getElementById("posts").prepend(div);
  document.getElementById("postInput").value = "";
}

function addComment() {
  let text = document.getElementById("commentInput").value;
  if (!text) return;

  let div = document.createElement("div");
  div.className = "comment";
  div.innerText = text;

  document.getElementById("comments").appendChild(div);
  document.getElementById("commentInput").value = "";
}
</script>

</body>
</html>
