<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>h337 Blog</title>

<style>
:root {
  --bg:#ffffff;
  --text:#111;
  --card:#f5f5f5;
  --accent:#007bff;
}

body.dark {
  --bg:#0d1117;
  --text:#e6edf3;
  --card:#161b22;
  --accent:#58a6ff;
}

body {
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
}

.btn {
  background:var(--accent);
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
}

.container { padding:15px; }

.card {
  background:var(--card);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(15px);}
  to {opacity:1;}
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

.like {
  margin-top:10px;
  cursor:pointer;
  color:gray;
}

.like.active {
  color:red;
}

</style>
</head>

<body>

<header>
  <h3>🔥 h337 Blog</h3>
  <button class="btn" onclick="toggleTheme()">🌙</button>
</header>

<div class="container">

<div class="card">
  <textarea id="postInput" placeholder="Напиши лайфхак..."></textarea>
  <button class="btn" onclick="addPost()">Опубликовать</button>
</div>

<div id="posts"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function save() {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function render() {
  let container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach((post, i) => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p>${post.text}</p>
      <div class="like ${post.liked ? "active":""}" onclick="like(${i})">
        ❤️ ${post.likes}
      </div>
    `;

    container.appendChild(div);
  });
}

function addPost() {
  let text = document.getElementById("postInput").value;
  if (!text) return;

  posts.unshift({ text:text, likes:0, liked:false });
  save();
  render();

  document.getElementById("postInput").value="";
}

function like(i) {
  let post = posts[i];

  if (post.liked) {
    post.likes--;
    post.liked=false;
  } else {
    post.likes++;
    post.liked=true;
  }

  save();
  render();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark"));
}

if (localStorage.getItem("theme") === "true") {
  document.body.classList.add("dark");
}

render();
</script>

</body>
</html>
