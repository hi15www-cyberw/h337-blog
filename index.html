<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBrand Racing 🚗</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game" id="game">

  <div class="road"></div>

  <div class="player" id="player">
    <div class="fire" id="fire"></div>
  </div>

  <div class="ui">
    <div id="score">0</div>
    <div id="coins">💰 0</div>
  </div>

  <!-- NITRO -->
  <div class="nitroBar" id="nitroBar"></div>
  <button class="nitroBtn" id="nitroBtn">⚡</button>

  <!-- MENU -->
  <div class="menu" id="menu">
    <h2>🚗 Racing</h2>
    <button onclick="start()">Start</button>
    <button onclick="openGarage()">Garage</button>
    <button onclick="openUpgrades()">Upgrades</button>
  </div>

  <!-- GARAGE -->
  <div class="garage" id="garage" style="display:none;">
    <h3>🚗 Гараж</h3>

    <div class="car" onclick="buyCar(0)">🚗</div>
    <div class="car" onclick="buyCar(1)">🚙 50💰</div>
    <div class="car" onclick="buyCar(2)">🏎 100💰</div>

    <button onclick="closeGarage()">Назад</button>
  </div>

  <!-- UPGRADES -->
  <div class="upgrades" id="upgrades" style="display:none;">
    <h3>⚙️ Апгрейды</h3>

    <button onclick="upgradeSpeed()">🚀 Скорость</button>
    <button onclick="upgradeNitro()">⚡ Нитро</button>

    <p id="stats"></p>

    <button onclick="closeUpgrades()">Назад</button>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
