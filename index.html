<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBrand 🚀</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1 class="logo">MyBrand 🚀</h1>

  <!-- USER -->
  <div class="card">
    <p id="user">Ты не вошёл</p>
    <button id="loginBtn">Войти через Google</button>
    <button id="logoutBtn">Выйти</button>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h2>📝 Посты</h2>
    <input id="postInput" placeholder="Написать пост...">
    <button onclick="addPost()">Опубликовать</button>

    <div id="posts"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button onclick="showTips()">Советы</button>
    <button onclick="showHacks()">Лайфхаки</button>
  </div>

  <div id="content" class="card"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
