<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBrand 🚀</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #loginBtn {
      background: #22c55e;
      color: white;
    }

    #logoutBtn {
      background: #ef4444;
      color: white;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>MyBrand 🚀</h1>
    <p id="user">Ты не вошёл</p>
    <button id="loginBtn">Войти через Google</button>
    <button id="logoutBtn">Выйти</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

    import { 
      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnPp93cxNe9KE-5HM6IXoMAaSEoAJuTZ4",
      authDomain: "mybrand-blog.firebaseapp.com",
      projectId: "mybrand-blog",
      storageBucket: "mybrand-blog.firebasestorage.app",
      messagingSenderId: "395834373747",
      appId: "1:395834373747:web:fbd42c5c9c3b638f4d1c06"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userText = document.getElementById("user");

    loginBtn.onclick = () => {
      signInWithPopup(auth, provider)
        .catch(err => alert(err.message));
    };

    logoutBtn.onclick = () => {
      signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        userText.textContent = "Ты вошёл: " + user.displayName;
      } else {
        userText.textContent = "Ты не вошёл";
      }
    });
  </script>

</body>
</html>
