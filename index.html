<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing 🚗</title>

<style>
body{
  margin:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:320px;
  height:550px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

/* ROAD */
.road{
  position:absolute;
  width:100%;
  height:200%;
  background:linear-gradient(#333 50%, #222 50%);
  background-size:100% 40px;
  animation:roadMove 0.3s linear infinite;
}

@keyframes roadMove{
  from{transform:translateY(0);}
  to{transform:translateY(40px);}
}

/* PLAYER */
.player{
  width:60px;
  height:100px;
  position:absolute;
  bottom:20px;
  left:130px;
  background:url('https://i.imgur.com/7QZ8Z6F.png') center/cover;
}

/* ENEMY */
.enemy{
  width:60px;
  height:100px;
  position:absolute;
  top:-100px;
  background-size:cover;
}

/* MENU */
.menu{
  position:absolute;
  width:100%;
  height:100%;
  background:#000c;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* BUTTON */
button{
  padding:12px 25px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="game" id="game">

  <div class="road"></div>

  <div class="player" id="player"></div>

  <div class="menu" id="menu">
    <h2>🚗 Racing</h2>
    <button onclick="start()">Start</button>
  </div>

</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const menu = document.getElementById("menu");

let x = 130;
let running = false;

// START
function start(){
  menu.style.display="none";
  running = true;
  spawnEnemy(); // запуск спавна
}

// CONTROL
document.addEventListener("touchmove", e=>{
  x = e.touches[0].clientX - 30;
});

// 🚗 УМНЫЙ СПАВН ВРАГОВ
function spawnEnemy(){
  if(!running) return;

  let e = document.createElement("div");
  e.className = "enemy";

  let cars = [
   "https://i.imgur.com/zYxDCQT.png",
   "https://i.imgur.com/U3s9QpD.png",
   "https://i.imgur.com/3sY7X4D.png"
  ];

  let randomCar = cars[Math.floor(Math.random()*cars.length)];
  e.style.background = `url(${randomCar}) center/cover`;

  e.style.left = Math.random()*260 + "px";
  game.appendChild(e);

  // 🔥 ВАЖНО: случайная задержка (меньше врагов)
  setTimeout(spawnEnemy, Math.random()*2000 + 1200);
}

// LOOP
function loop(){
  if(running){

    player.style.left = x + "px";

    document.querySelectorAll(".enemy").forEach(el=>{
      let top = el.offsetTop;
      el.style.top = top + 5 + "px";

      // столкновение
      if(
        el.offsetTop+80>460 &&
        el.offsetLeft < x+50 &&
        el.offsetLeft+50 > x
      ){
        running=false;
        alert("💥 Game Over");
        location.reload();
      }

      if(top>600) el.remove();
    });
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
