<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBrand 🚀</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="card">
    <h1>MyBrand 🚀</h1>
    <p id="user">Ты не вошёл</p>
    <button class="login" id="loginBtn">Войти через Google</button>
    <button class="logout" id="logoutBtn">Выйти</button>
  </div>

  <div class="card">
    <h3>Создать пост</h3>
    <textarea id="postInput" placeholder="Напиши что-нибудь..."></textarea>
    <button class="postBtn" id="addPost">Опубликовать</button>
  </div>

  <div id="posts"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
