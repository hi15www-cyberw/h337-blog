<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing 🚗</title>

<style>
body{
  margin:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.game{
  width:320px;
  height:550px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

/* ROAD */
.road{
  position:absolute;
  width:100%;
  height:200%;
  background:linear-gradient(#333 50%, #222 50%);
  background-size:100% 40px;
  animation:roadMove 0.3s linear infinite;
}

@keyframes roadMove{
  from{transform:translateY(0);}
  to{transform:translateY(40px);}
}

/* PLAYER */
.player{
  width:60px;
  height:100px;
  position:absolute;
  bottom:20px;
  left:130px;
  background:url('https://i.imgur.com/7QZ8Z6F.png') center/cover;
}

/* ENEMY */
.enemy{
  width:60px;
  height:100px;
  position:absolute;
  top:-100px;
  background-size:cover;
}

/* MENU */
.menu{
  position:absolute;
  width:100%;
  height:100%;
  background:#000c;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:5;
}

/* BUTTON */
button{
  padding:12px 25px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="game" id="game">

  <div class="road"></div>

  <div class="player" id="player"></div>

  <div class="menu" id="menu">
    <h2>🚗 Racing</h2>
    <button onclick="start()">Start</button>
  </div>

</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const menu = document.getElementById("menu");

let x = 130;
let running = false;
let score = 0;
let difficulty = 1;

// START
function start(){
  menu.style.display="none";
  running = true;
  spawnEnemy();
}

// CONTROL
document.addEventListener("touchmove", e=>{
  x = e.touches[0].clientX - 30;
});

// 🚗 СПАВН (редкий + растёт сложность)
function spawnEnemy(){
  if(!running) return;

  let e = document.createElement("div");
  e.className = "enemy";

  let cars = [
   "https://i.imgur.com/zYxDCQT.png",
   "https://i.imgur.com/U3s9QpD.png",
   "https://i.imgur.com/3sY7X4D.png"
  ];

  let randomCar = cars[Math.floor(Math.random()*cars.length)];
  e.style.background = `url(${randomCar}) center/cover`;

  e.style.left = Math.random()*260 + "px";
  game.appendChild(e);

  // 🔥 чем больше играешь — тем чаще враги
  let delay = Math.max(700, 2000 - difficulty * 120);
  setTimeout(spawnEnemy, delay);
}

// LOOP
function loop(){
  if(running){

    player.style.left = x + "px";

    score++;

    // 📈 сложность растёт
    difficulty = Math.floor(score / 100);

    document.querySelectorAll(".enemy").forEach(el=>{
      let top = el.offsetTop;

      // 🚀 скорость увеличивается
      let speed = 4 + difficulty * 0.6;

      el.style.top = top + speed + "px";

      // 💥 столкновение
      if(
        el.offsetTop+80>460 &&
        el.offsetLeft < x+50 &&
        el.offsetLeft+50 > x
      ){
        running=false;
        alert("💥 Game Over\nScore: " + score);
        location.reload();
      }

      if(top>600) el.remove();
    });
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
