<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBrand 🚀</title>

<style>
:root {
  --bg: #0b0b12;
  --card: rgba(255,255,255,0.05);
  --text: #ffffff;
  --accent: #a855f7;
  --accent2: #7c3aed;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #1a0f2e, #0b0b12);
  color: var(--text);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

/* логотип */
.logo {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
  background: linear-gradient(45deg, #c084fc, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* карточки */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* кнопки */
.button {
  background: linear-gradient(45deg, var(--accent), var(--accent2));
  border: none;
  color: white;
  padding: 12px;
  border-radius: 12px;
  width: 100%;
  margin-top: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.05);
}

/* пост */
.post {
  background: rgba(255,255,255,0.04);
  padding: 14px;
  border-radius: 16px;
  margin-top: 10px;
  animation: fadeIn 0.5s ease;
}

.post h3 {
  margin: 0 0 6px;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.actions span {
  cursor: pointer;
  transition: 0.2s;
}

.actions span:hover {
  color: var(--accent);
}

/* input */
input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  margin-top: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* переключатель темы */
.toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* светлая тема */
.light {
  --bg: #ffffff;
  --card: rgba(0,0,0,0.05);
  --text: #000;
}

</style>
</head>

<body>
<div class="container">

<div class="logo">MyBrand 🚀</div>

<div class="card">
👀 Онлайн: <b>14</b>
</div>

<div class="card toggle">
🌙 Тёмный режим
<input type="checkbox" onchange="toggleTheme(this)">
</div>

<div class="card">
🔥 Разделы
<div class="post">🔥 Лайфхаки</div>
<div class="post">💡 Советы</div>
</div>

<div class="card">
✏️ Создать пост
<input id="title" placeholder="Заголовок">
<textarea id="content" placeholder="Напиши что-нибудь..."></textarea>
<button class="button" onclick="addPost()">Опубликовать</button>
</div>

<div class="card">
⭐ Популярные посты
<div id="posts"></div>
</div>

</div>

<script>

let posts = [
{title:"Как быстро выучить что угодно", text:"Используй повторение и ассоциации", likes:12},
{title:"5 полезных привычек", text:"Пей воду, спи нормально, двигайся", likes:8},
{title:"Как не лениться", text:"Разбей задачи на маленькие шаги", likes:5}
];

function render() {
  let html = "";
  posts.forEach((p,i)=>{
    html += `
    <div class="post">
      <h3>${p.title}</h3>
      <p>${p.text}</p>
      <div class="actions">
        <span onclick="like(${i})">❤️ ${p.likes}</span>
        <span>💬</span>
        <span>🔖</span>
      </div>
    </div>`;
  });
  document.getElementById("posts").innerHTML = html;
}

function addPost(){
  let t = document.getElementById("title").value;
  let c = document.getElementById("content").value;

  if(!t || !c) return alert("Заполни всё");

  posts.unshift({title:t, text:c, likes:0});
  render();
}

function like(i){
  posts[i].likes++;
  render();
}

function toggleTheme(el){
  document.body.classList.toggle("light", el.checked);
}

render();

</script>

</body>
</html>
