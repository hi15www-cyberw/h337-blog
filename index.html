<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBrand 🚀</title>

<style>
:root {
  --bg:#fff;
  --text:#111;
  --card:#f5f5f7;
}

.dark {
  --bg:#000;
  --text:#fff;
  --card:#1c1c1e;
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-size:20px;
}

.post {
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fade 0.5s;
}

@keyframes fade {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}

.actions {
  position:absolute;
  right:20px;
  bottom:100px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

button {
  padding:10px;
  border-radius:50%;
  border:none;
}

.container {
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
</style>
</head>

<body>

<header>
  MyBrand 🚀
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="login()">🔐</button>
  </div>
</header>

<div class="container" id="posts"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
// 🔴 ВСТАВЬ СЮДА СВОЙ CONFIG ИЗ FIREBASE
const firebaseConfig = {
  apiKey: "ТВОЙ",
  authDomain: "ТВОЙ",
  projectId: "ТВОЙ",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    console.log("Вошёл:", user.displayName);
  }
});

function loadPosts(){
  db.collection("posts").onSnapshot(snapshot=>{
    let container = document.getElementById("posts");
    container.innerHTML="";
    snapshot.forEach(doc=>{
      let p = doc.data();

      container.innerHTML += `
        <div class="post">
          <h2>${p.text}</h2>

          <div class="actions">
            <button onclick="like('${doc.id}')">❤️ ${p.likes||0}</button>
            <button onclick="comment('${doc.id}')">💬</button>
          </div>
        </div>
      `;
    });
  });
}

function like(id){
  let ref = db.collection("posts").doc(id);
  ref.update({
    likes: firebase.firestore.FieldValue.increment(1)
  });
}

function comment(id){
  let text = prompt("Комментарий:");
  if(!text) return;

  db.collection("posts").doc(id).collection("comments").add({
    text:text,
    date:Date.now()
  });

  alert("Добавлено 💬");
}

function toggleTheme(){
  document.body.classList.toggle("dark");
}

loadPosts();
</script>

</body>
</html>
